<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container" style="max-width: 420px;">
        <div id="mensaje" class="alert d-none mb-3 text-center"></div>

        <div class="border border-secondary rounded-4 bg-body-tertiary p-4 shadow-sm">
            <div class="text-center mb-4">
                <h1 class="h3 fw-bold mb-1">Administración</h1>
                <p class="text-secondary small">Librería Alérgicos a Leer</p>
            </div>

            <form id="formularioLogin">
                <div class="mb-3">
                    <label for="username" class="form-label small text-secondary">Usuario</label>
                    <input type="text" id="username" class="form-control bg-dark text-white border-secondary" placeholder="Ingrese su usuario" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label small text-secondary">Contraseña</label>
                    <input type="password" id="password" class="form-control bg-dark text-white border-secondary" placeholder="Ingrese su contraseña" required>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" id="btnIngresar" class="btn btn-dark rounded-pill border-secondary py-2">Ingresar al Panel</button>
                    <a href="/" class="btn btn-outline-secondary rounded-pill border-secondary py-2 mt-1 small">Volver al Inicio</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const formulario = document.getElementById('formularioLogin');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const btnIngresar = document.getElementById('btnIngresar');
        const mensaje = document.getElementById('mensaje');

        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (username === '' || password === '') {
                mostrarMensaje('Ingrese usuario y contraseña', 'error');
                return;
            }

            try {
                btnIngresar.disabled = true;
                const respuesta = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const resultado = await respuesta.json();
                
                if (!respuesta.ok) {
                    throw new Error(resultado.mensaje);
                }

                mostrarMensaje('Ingreso correcto. Redirigiendo...', 'exito');
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1000);

            } catch (error) {
                mostrarMensaje(error.message || 'Error al conectar con el servidor', 'error');
                console.error(error);
                btnIngresar.disabled = false;
            }
        });

        function mostrarMensaje(texto, tipo) {
            mensaje.textContent = texto;
            mensaje.className = tipo === 'exito'
                ? 'alert alert-success mb-3 text-center'
                : 'alert alert-danger mb-3 text-center';
            mensaje.classList.remove('d-none');
            
            if (tipo === 'error') {
                setTimeout(() => {
                    mensaje.classList.add('d-none');
                }, 4000);
            }
        }
    </script>
</body>
</html>
