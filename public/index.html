<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alérgicos a Leer - Biblioteca Pública</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg navbar-dark bg-body-tertiary border-bottom border-secondary mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold fs-4">Alérgicos a Leer 📚</span>
            <div class="ms-auto">
                <a href="/login" class="btn btn-dark border-secondary rounded-pill btn-sm px-3">Administración</a>
            </div>
        </div>
    </nav>

    <main class="container py-2">
        <div id="mensaje" class="alert d-none"></div>

        <div class="border border-secondary rounded-4 bg-body-tertiary p-4 mb-4">
            <h2 id="tituloFormulario" class="h5 fw-bold mb-3">Solicitar Préstamo de Libro</h2>
            <form id="formularioPrestamo">
                <div class="row g-3 align-items-end">
                    <div class="col-12 col-md-5">
                        <label for="nombre_cliente" class="form-label small text-secondary">Tu Nombre Completo</label>
                        <input type="text" id="nombre_cliente" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="Ej: Juan Pérez" maxlength="200" required>
                    </div>
                    <div class="col-12 col-md-5">
                        <label for="fk_id_libro" class="form-label small text-secondary font-monospace">Selecciona un Libro</label>
                        <select id="fk_id_libro" class="form-select form-select-sm bg-dark text-white border-secondary" required>
                            <option value="" disabled selected>Seleccione un libro...</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-2 d-grid">
                        <button type="submit" id="btnGuardar" class="btn btn-dark rounded-pill btn-sm border-secondary">Solicitar</button>
                    </div>
                </div>
            </form>
        </div>

        <h2 class="h5 fw-bold mb-3">Catálogo de Libros Disponibles</h2>
        <div class="table-responsive border border-secondary rounded-4 overflow-hidden">
            <table class="table table-dark table-striped table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="py-3 px-4">ISBN</th>
                        <th class="py-3">Título</th>
                        <th class="py-3">Autor(es)</th>
                        <th class="py-3">Género</th>
                        <th class="py-3 text-center">Año</th>
                        <th class="py-3 text-center">Stock</th>
                        <th class="py-3 text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaLibros">
                </tbody>
            </table>
        </div>

        <div id="sinRegistros" class="alert alert-secondary text-center mt-3 d-none">
            No hay libros registrados en el catálogo
        </div>

        <p class="text-center text-secondary mt-4 mb-2 small font-monospace">
            Librería Alérgicos a Leer © 2026 - Conectado a base de datos de laboratorio
        </p>
    </main>

    <template id="filaLibroTemplate">
        <tr>
            <td class="libro-isbn px-4 font-monospace small"></td>
            <td class="libro-titulo fw-bold"></td>
            <td class="libro-autores"></td>
            <td class="libro-genero"></td>
            <td class="libro-anio text-center small"></td>
            <td class="libro-stock text-center fw-bold"></td>
            <td class="text-center">
                <button type="button" class="btn btn-outline-info btn-sm rounded-pill btn-pedir">Pedir</button>
            </td>
        </tr>
    </template>

    <!-- Modal de Voucher -->
    <div class="modal fade" id="modalVoucher" tabindex="-1" aria-labelledby="modalVoucherLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fw-bold" id="modalVoucherLabel">🎫 Tu Voucher de Préstamo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="contenidoVoucher">
                    <!-- Se llenará dinámicamente -->
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light rounded-pill btn-sm px-3" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" id="btnDescargarPDF" class="btn btn-success rounded-pill btn-sm px-3">Descargar PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="/js/public.js"></script>
</body>
</html>
